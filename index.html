<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Workplace Hub</title>
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0f172a" />
    <link rel="apple-touch-icon" href="/logo-192.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/logo-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/logo-512.png" />

    <script>
      // Patch global ResizeObserver to run callback inside requestAnimationFrame
      // This eliminates the browser warning "ResizeObserver loop completed with undelivered notifications"
      if (typeof window !== 'undefined' && window.ResizeObserver) {
        const OriginalResizeObserver = window.ResizeObserver;
        window.ResizeObserver = class ResizeObserver extends OriginalResizeObserver {
          constructor(callback) {
            super((entries, observer) => {
              window.requestAnimationFrame(() => {
                if (!Array.isArray(entries) || !entries.length) return;
                try {
                  callback(entries, observer);
                } catch (e) {
                  // Silently absorb benign observer loop errors
                }
              });
            });
          }
        };
      }

      // Suppress any remaining uncaught ResizeObserver loop warning events on the window
      window.addEventListener('error', e => {
        if (e.message && (
          e.message.includes('ResizeObserver loop completed with undelivered notifications') ||
          e.message.includes('ResizeObserver loop limit exceeded') ||
          e.message.includes('ResizeObserver')
        )) {
          e.stopImmediatePropagation();
          e.preventDefault();
        }
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

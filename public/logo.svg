<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <drop-shadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.15" />
    </filter>
  </defs>
  <!-- Background Rounded Rect -->
  <rect width="512" height="512" rx="128" fill="#0f172a" />
  
  <!-- Outer glowing ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="url(#grad1)" stroke-width="8" opacity="0.4" />
  
  <!-- Digital hub network nodes -->
  <g filter="url(#shadow)">
    <!-- Central Hexagon / Cube representation -->
    <path d="M 256,120 L 370,186 L 370,326 L 256,392 L 142,326 L 142,186 Z" fill="url(#grad1)" opacity="0.9" />
    <path d="M 256,120 L 256,392" stroke="#ffffff" stroke-width="3" opacity="0.3" />
    <path d="M 142,186 L 370,326" stroke="#ffffff" stroke-width="3" opacity="0.3" />
    <path d="M 370,186 L 142,326" stroke="#ffffff" stroke-width="3" opacity="0.3" />
    
    <!-- Central Core -->
    <circle cx="256" cy="256" r="48" fill="#ffffff" />
    <circle cx="256" cy="256" r="32" fill="url(#grad2)" />
    
    <!-- Outer connection satellite nodes -->
    <circle cx="256" cy="120" r="16" fill="#06b6d4" />
    <circle cx="370" cy="186" r="16" fill="#2563eb" />
    <circle cx="370" cy="326" r="16" fill="#4f46e5" />
    <circle cx="256" cy="392" r="16" fill="#06b6d4" />
    <circle cx="142" cy="326" r="16" fill="#4f46e5" />
    <circle cx="142" cy="186" r="16" fill="#2563eb" />
  </g>
</svg>
